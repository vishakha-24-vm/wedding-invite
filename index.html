<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nayan & Juned Wedding</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Playfair Display', serif;
            background: radial-gradient(circle, #5a0000, #1a0000);
            color: gold;
            overflow: hidden;
        }

        /* DOOR */
        .door-wrapper {
            perspective: 1200px;
            height: 100vh;
            display: flex;
            cursor: pointer;
            position: relative;
        }

        .door {
            width: 50%;
            height: 100%;
            background: linear-gradient(145deg, #b30000, #5a0000);
            border: 3px solid gold;
            transition: transform 1.5s ease;
            position: relative;
        }

        .door:before {
            content: "";
            position: absolute;
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, gold, #d4af37);
            border-radius: 50%;
            top: 50%;
        }

        .left:before { right: 20px; }
        .right:before { left: 20px; }

        .left {
            transform-origin: left;
        }

        .right {
            transform-origin: right;
        }

        .open .left { transform: rotateY(-110deg); }
        .open .right { transform: rotateY(110deg); }

        .center-text {
            position: absolute;
            width: 100%;
            top: 45%;
            text-align: center;
            font-size: 30px;
            color: gold;
        }

        /* GOLD TEXT */
        .gold-text {
            font-size: 48px;
            background: linear-gradient(120deg, #ffd700, #fff8dc, #ffd700, #e6c200);
            background-size: 200%;
            -webkit-background-clip: text;
            color: transparent;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            from { background-position: -200%; }
            to   { background-position: 200%; }
        }

        /* CONTENT SECTIONS */
        .section {
            padding: 60px 20px;
            text-align: center;
            opacity: 0;
            transform: translateY(40px);
            transition: 1s;
        }
        .section.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* SCRATCH */
        .scratch-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        canvas {
            border-radius: 50%;
            background: gray;
        }

        #date {
            font-size: 30px;
            margin-top: 15px;
            color: gold;
        }

        /* PARTICLES */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <canvas id="particles"></canvas>

    <audio id="music" loop>
        <source src="https://filesamples.com/samples/audio/mp3/sample3.mp3">
    </audio>

    <!-- DOOR PAGE -->
    <div id="doorPage">
        <div class="door-wrapper" onclick="openDoor()">
            <div class="door left"></div>
            <div class="door right"></div>
            <div class="center-text">Tap to Open 💖</div>
        </div>
    </div>

    <!-- CONTENT PAGE -->
    <div id="content" style="display:none">

        <div class="section">
            <h1 class="gold-text">Nayan & Juned</h1>
            <p>With love, we invite you</p>
        </div>

        <div class="section">
            <h2>Scratch to Reveal Date</h2>

            <div class="scratch-area">
                <canvas width="120" height="120"></canvas>
                <canvas width="120" height="120"></canvas>
                <canvas width="120" height="120"></canvas>
            </div>

            <p id="date" style="display:none">💛 6th May 2026 💛</p>
        </div>

        <div class="section">
            <h2>Venue</h2>
            <p>Royal Palace Banquet Hall, Pune</p>
        </div>

    </div>

    <script>
        /* MUSIC AUTOPLAY */
        function playMusic() {
            let m = document.getElementById("music");
            m.play().catch(() => {
                document.body.addEventListener("click", () => m.play(), { once: true });
            });
        }

        /* DOOR OPEN */
        function openDoor() {
            document.body.classList.add("open");
            playMusic();

            setTimeout(() => {
                document.getElementById("doorPage").style.display = "none";
                document.getElementById("content").style.display = "block";
                showSections();
            }, 1500);
        }

        /* SECTION SLIDE */
        function showSections() {
            document.querySelectorAll(".section").forEach((sec, i) => {
                setTimeout(() => sec.classList.add("show"), i * 400);
            });
        }

        /* SCRATCH LOGIC */
        document.querySelectorAll("canvas").forEach(c => {
            let ctx = c.getContext("2d");
            ctx.fillStyle = "#999";
            ctx.fillRect(0, 0, 120, 120);

            function scratch(x, y) {
                ctx.globalCompositeOperation = "destination-out";
                ctx.beginPath();
                ctx.arc(x, y, 15, 0, Math.PI * 2);
                ctx.fill();
                document.getElementById("date").style.display = "block";
            }

            c.addEventListener("mousemove", e => {
                if (e.buttons !== 1) return;
                let r = c.getBoundingClientRect();
                scratch(e.clientX - r.left, e.clientY - r.top);
            });

            c.addEventListener("touchmove", e => {
                let t = e.touches[0];
                let r = c.getBoundingClientRect();
                scratch(t.clientX - r.left, t.clientY - r.top);
            });
        });

        /* PARTICLE RAIN */
        let canvas = document.getElementById("particles");
        let ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        for (let i = 0; i < 80; i++) {
            particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, r: 2 });
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "gold";
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fill();
                p.y += 0.7;
                if (p.y > canvas.height) p.y = 0;
            });
        }

        setInterval(drawParticles, 30);
    </script>

</body>
</html>
